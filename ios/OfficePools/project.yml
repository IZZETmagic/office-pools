name: OfficePools
options:
  bundleIdPrefix: com.officepools
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  OfficePools:
    type: application
    platform: iOS
    sources:
      - App
      - Models
      - Services
      - Views
      - ViewModels
      - Utilities
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.officepools.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: Supabase
        product: Supabase
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Office Pools
        CFBundleName: OfficePools
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
